apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexora-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ORG/nexora-academy-api.git
    targetRevision: main
    path: deploy/helm/nexora-api
  destination:
    server: https://kubernetes.default.svc
    namespace: nexora
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
